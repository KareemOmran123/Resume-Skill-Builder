name: Reusable Frontend CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use for the Vite build.
        required: true
        type: string

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend build (Node ${{ inputs.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache npm downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ inputs.node-version }}-
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
