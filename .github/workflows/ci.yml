name: Pull Request CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend CI
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20"
          - "22"
    uses: ./.github/workflows/reusable-frontend-ci.yml
    with:
      node-version: ${{ matrix.node-version }}

  backend:
    name: Backend CI
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    uses: ./.github/workflows/reusable-backend-ci.yml
    with:
      python-version: ${{ matrix.python-version }}

  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    permissions:
      contents: read
    steps:
      - name: Mark CI complete
        run: echo "Frontend and backend checks passed."
