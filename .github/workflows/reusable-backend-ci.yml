name: Reusable Backend CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use for backend checks.
        required: true
        type: string

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('backend/pyproject.toml', 'backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install backend package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend

      - name: Run backend unit tests
        env:
          THEIRSTACK_API_KEY: ""
        run: python -m unittest discover -s backend/tests
